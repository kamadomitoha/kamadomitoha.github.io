<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Performa Driver</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        /* Style untuk Tab Menu */
        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #e0e0e0;
            border-radius: 5px 5px 0 0;
        }
        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 16px;
            font-weight: bold;
        }
        .tab button:hover {
            background-color: #ddd;
        }
        .tab button.active {
            background-color: #3498db;
            color: white;
        }
        /* Style untuk Konten Tab */
        .tabcontent {
            display: none;
            padding: 20px;
            border: 1px solid #ccc;
            border-top: none;
            background-color: white;
            border-radius: 0 0 5px 5px;
            overflow-x: auto; /* Agar tabel bisa di-scroll horizontal */
        }
        /* Style untuk Tabel */
        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 1200px; /* Minimal lebar agar angka 1-31 tidak terlalu dempet */
            font-size: 14px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #2c3e50;
            color: white;
            position: sticky;
            top: 0;
        }
        td.text-left {
            text-align: left;
        }
        .loading {
            text-align: center;
            font-style: italic;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <h2>Data Performa Driver</h2>

    <div class="tab">
        <button class="tablinks active" onclick="openTab(event, 'Point')">Pencapaian Point</button>
        <button class="tablinks" onclick="openTab(event, 'Ritase')">Ritase Driver</button>
    </div>

    <div id="Point" class="tabcontent" style="display:block;">
        <h3>Tabel Hasil Pencapaian Point</h3>
        <div id="loadingPoint" class="loading">Memuat data CSV...</div>
        <table id="tablePoint">
            <thead id="headPoint">
                </thead>
            <tbody id="bodyPoint">
                </tbody>
        </table>
    </div>

    <div id="Ritase" class="tabcontent">
        <h3>Tabel Hasil Ritase</h3>
        <div id="loadingRitase" class="loading">Memuat data CSV...</div>
        <table id="tableRitase">
            <thead id="headRitase">
                </thead>
            <tbody id="bodyRitase">
                </tbody>
        </table>
    </div>

    <script>
        // GANTI URL DI BAWAH INI DENGAN LINK CSV PUBLISH GOOGLE SPREADSHEET ANDA
        const csvUrlPoint = "https://docs.google.com/spreadsheets/d/e/2PACX-1vStyXFDgecMHHrxuX7ASAPPRKQIsTg8FtaQA1ot_LEh-KguGoH3DwQFfVT1ldjan9Nj-Gf-zJ53UUnY/pub?gid=843800816&single=true&output=csv"; 
        const csvUrlRitase = "https://docs.google.com/spreadsheets/d/e/2PACX-1vStyXFDgecMHHrxuX7ASAPPRKQIsTg8FtaQA1ot_LEh-KguGoH3DwQFfVT1ldjan9Nj-Gf-zJ53UUnY/pub?gid=319911176&single=true&output=csv";

        // Fungsi untuk berpindah Tab
        function openTab(evt, tabName) {
            let i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }

        // Template Header Kolom
        const headers1_31 = Array.from({length: 31}, (_, i) => i + 1);
        
        // Render Header Tabel Point
        const headPointTemplate = `
            <tr>
                <th>NIK</th>
                <th>NAMA</th>
                ${headers1_31.map(d => `<th>${d}</th>`).join('')}
                <th>Total Point</th>
            </tr>`;
        document.getElementById('headPoint').innerHTML = headPointTemplate;

        // Render Header Tabel Ritase
        const headRitaseTemplate = `
            <tr>
                <th>NIK</th>
                <th>NAMA</th>
                ${headers1_31.map(d => `<th>${d}</th>`).join('')}
                <th>Total Ritase</th>
                <th>Rata2 Ritase</th>
            </tr>`;
        document.getElementById('headRitase').innerHTML = headRitaseTemplate;

        // Fungsi untuk mengambil dan merender Data CSV menggunakan PapaParse
        function fetchAndRenderCSV(url, tbodyId, loadingId, expectedColumns) {
            Papa.parse(url, {
                download: true,
                header: true, // Ubah ke false jika CSV tidak pakai header bawaan
                skipEmptyLines: true,
                complete: function(results) {
                    document.getElementById(loadingId).style.display = 'none';
                    const data = results.data;
                    let rowsHtml = '';
                    
                    data.forEach(row => {
                        rowsHtml += '<tr>';
                        // Karena key pada CSV mungkin berbeda-beda, kita akses berdasarkan urutan index (Object.values)
                        // Pastikan format kolom Google Sheets Anda: NIK | NAMA | 1 | 2 | ... | 31 | Total | (Rata2 untuk ritase)
                        const rowValues = Object.values(row);
                        
                        for (let i = 0; i < expectedColumns; i++) {
                            // Kolom NAMA dibuat text-left, sisanya center
                            let alignClass = (i === 1) ? 'class="text-left"' : '';
                            let cellValue = rowValues[i] !== undefined ? rowValues[i] : '-';
                            rowsHtml += `<td ${alignClass}>${cellValue}</td>`;
                        }
                        rowsHtml += '</tr>';
                    });

                    document.getElementById(tbodyId).innerHTML = rowsHtml;
                },
                error: function(err) {
                    document.getElementById(loadingId).innerText = "Gagal memuat data. Pastikan link CSV benar dan dapat diakses publik.";
                    console.error("PapaParse Error:", err);
                }
            });
        }

        // Panggil fungsi saat halaman selesai dimuat
        window.onload = function() {
            // Jumlah kolom Point: NIK(1) + NAMA(1) + Tgl(31) + Total(1) = 34 Kolom
            fetchAndRenderCSV(csvUrlPoint, 'bodyPoint', 'loadingPoint', 34);
            
            // Jumlah kolom Ritase: NIK(1) + NAMA(1) + Tgl(31) + Total(1) + Rata2(1) = 35 Kolom
            fetchAndRenderCSV(csvUrlRitase, 'bodyRitase', 'loadingRitase', 35);
        };
    </script>

</body>
</html>
