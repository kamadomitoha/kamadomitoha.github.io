<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Armada Operasional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Gaya khusus untuk tabel agar mirip Excel */
        .table th, .table td { vertical-align: middle; white-space: nowrap; }
        .cell-hijau { background-color: #28a745 !important; color: white; font-weight: bold; }
        .cell-kuning { background-color: #ffc107 !important; color: black; font-weight: bold; }
        .cell-merah { background-color: #dc3545 !important; color: white; font-weight: bold; }
    </style>
</head>
<body class="bg-light">

    <div class="container-fluid py-4 px-4">
        <h2 class="text-center mb-4">Status Kendaraan Operasional</h2>

        <div class="row mb-4">
            <div class="col-md-6 mb-3">
                <div class="card shadow-sm p-3 bg-white rounded">
                    <h5 class="card-title text-center">Status Kendaraan (Aktif vs P3AT)</h5>
                    <canvas id="chartStatus"></canvas>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="card shadow-sm p-3 bg-white rounded">
                    <h5 class="card-title text-center">Komposisi Merk Kendaraan</h5>
                    <canvas id="chartMerk"></canvas>
                </div>
            </div>
        </div>

        <div class="card shadow-sm p-3 bg-white rounded overflow-auto">
            <h5 class="card-title mb-3">Database Armada</h5>
            <table class="table table-bordered table-hover text-center table-sm">
                <thead class="table-light">
                    <tr id="tableHeader">
                        </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // GANTI DENGAN LINK CSV GOOGLE SHEETS ANDA
        const googleSheetsCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS7xmfcsygPQSwthTtc-xv1ymw8e6kELoeRhsfqD6Nvmq_XIRCRIwcBVQr2-6goRYodYDYQiZV6vG8u/pub?gid=485712193&single=true&output=csv';

        function muatData() {
            Papa.parse(googleSheetsCsvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    tampilkanTabel(data);
                    tampilkanGrafik(data);
                }
            });
        }

        function tampilkanTabel(data) {
            const headerRow = document.getElementById('tableHeader');
            const bodyContainer = document.getElementById('tableBody');

            // Susunan kolom sesuai gambar Anda
            const kolomTarget = ['NOPOL', 'LAMBUNG', 'STATUS', 'MERK', 'TAHUN', 'UMUR', 'JENIS', 'DEPT'];
            
            // Render Header
            headerRow.innerHTML = kolomTarget.map(k => `<th>${k}</th>`).join('');

            // Render Isi Tabel dengan Pewarnaan Otomatis
            bodyContainer.innerHTML = data.map(row => {
                let htmlRow = '<tr>';
                
                kolomTarget.forEach(k => {
                    let nilai = row[k] ? row[k].trim() : '';
                    let kelasWarna = '';

                    // Logika warna untuk kolom STATUS
                    if (k === 'STATUS' && nilai.toUpperCase() === 'AKTIF') {
                        kelasWarna = 'cell-hijau';
                    }
                    
                    // Logika warna untuk kolom UMUR
                    if (k === 'UMUR' && nilai !== '') {
                        let umur = parseInt(nilai);
                        if (umur >= 15) {
                            kelasWarna = 'cell-merah';
                        } else if (umur >= 10) {
                            kelasWarna = 'cell-kuning';
                        } else {
                            kelasWarna = 'cell-hijau';
                        }
                    }

                    htmlRow += `<td class="${kelasWarna}">${nilai}</td>`;
                });
                
                htmlRow += '</tr>';
                return htmlRow;
            }).join('');
        }

        function tampilkanGrafik(data) {
            // Hitung data untuk Grafik Status
            let countAktif = 0;
            let countP3AT = 0;
            
            // Hitung data untuk Grafik Merk
            let merkCount = {};

            data.forEach(row => {
                // Hitung Status
                if(row.STATUS) {
                    let status = row.STATUS.trim().toUpperCase();
                    if(status === 'AKTIF') countAktif++;
                    else if (status === 'P3AT') countP3AT++;
                }

                // Hitung Merk
                if(row.MERK) {
                    let merk = row.MERK.trim().toUpperCase();
                    merkCount[merk] = (merkCount[merk] || 0) + 1;
                }
            });

            // 1. Gambar Grafik Status (Pie Chart)
            new Chart(document.getElementById('chartStatus').getContext('2d'), {
                type: 'pie',
                data: {
                    labels: ['AKTIF', 'P3AT'],
                    datasets: [{
                        data: [countAktif, countP3AT],
                        backgroundColor: ['#28a745', '#dc3545']
                    }]
                },
                options: { maintainAspectRatio: false }
            });

            // 2. Gambar Grafik Merk (Bar Chart)
            new Chart(document.getElementById('chartMerk').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: Object.keys(merkCount),
                    datasets: [{
                        label: 'Jumlah Kendaraan',
                        data: Object.values(merkCount),
                        backgroundColor: '#0d6efd'
                    }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        window.onload = muatData;
    </script>
</body>
</html>
